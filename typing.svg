<svg width="500" height="50" xmlns="http://www.w3.org/2000/svg">
  <style>
    .text {
      font-family: 'Fira Code', monospace;
      font-size: 20px;
      font-weight: 500;
      fill: #185FA5;
    }
    .cursor {
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .line1 { animation: show1 8s infinite; }
    .line2 { animation: show2 8s infinite; }
    .line3 { animation: show3 8s infinite; }
    .line4 { animation: show4 8s infinite; }
    @keyframes show1 {
      0%, 24%, 100% { opacity: 1; }
      25%, 99% { opacity: 0; }
    }
    @keyframes show2 {
      0%, 24% { opacity: 0; }
      25%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes show3 {
      0%, 49% { opacity: 0; }
      50%, 74% { opacity: 1; }
      75%, 100% { opacity: 0; }
    }
    @keyframes show4 {
      0%, 74% { opacity: 0; }
      75%, 99% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
  <text x="250" y="32" text-anchor="middle" class="text line1">Data Scientist</text>
  <text x="250" y="32" text-anchor="middle" class="text line2">Computer Vision Engineer</text>
  <text x="250" y="32" text-anchor="middle" class="text line3">ML/DL Pipeline Builder</text>
  <text x="250" y="32" text-anchor="middle" class="text line4">Python | TensorFlow | OpenCV</text>
</svg>
