<svg viewBox="0 0 600 60" xmlns="http://www.w3.org/2000/svg">
  <style>
    text {
      font-family: 'Courier New', monospace;
      font-size: 26px;
      font-weight: bold;
      fill: #185FA5;
    }
    .cursor {
      animation: blink 0.7s step-end infinite;
      fill: #185FA5;
      font-size: 28px;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Each text line uses clip-rect animation to simulate typing/deleting */
    /* Line 1: Data Scientist */
    .l1 { animation: l1anim 24s infinite; }
    @keyframes l1anim {
      0%   { opacity:1; clip-path: inset(0 100% 0 0); }
      8%   { opacity:1; clip-path: inset(0 0% 0 0); }
      18%  { opacity:1; clip-path: inset(0 0% 0 0); }
      25%  { opacity:1; clip-path: inset(0 100% 0 0); }
      26%  { opacity:0; clip-path: inset(0 100% 0 0); }
      100% { opacity:0; }
    }

    /* Line 2: Computer Vision Engineer */
    .l2 { animation: l2anim 24s infinite; }
    @keyframes l2anim {
      0%,25%  { opacity:0; clip-path: inset(0 100% 0 0); }
      26%     { opacity:1; clip-path: inset(0 100% 0 0); }
      34%     { opacity:1; clip-path: inset(0 0% 0 0); }
      44%     { opacity:1; clip-path: inset(0 0% 0 0); }
      51%     { opacity:1; clip-path: inset(0 100% 0 0); }
      52%     { opacity:0; }
      100%    { opacity:0; }
    }

    /* Line 3: ML/DL Pipeline Builder */
    .l3 { animation: l3anim 24s infinite; }
    @keyframes l3anim {
      0%,51%  { opacity:0; clip-path: inset(0 100% 0 0); }
      52%     { opacity:1; clip-path: inset(0 100% 0 0); }
      60%     { opacity:1; clip-path: inset(0 0% 0 0); }
      70%     { opacity:1; clip-path: inset(0 0% 0 0); }
      77%     { opacity:1; clip-path: inset(0 100% 0 0); }
      78%     { opacity:0; }
      100%    { opacity:0; }
    }

    /* Line 4: Python | TensorFlow | OpenCV */
    .l4 { animation: l4anim 24s infinite; }
    @keyframes l4anim {
      0%,77%  { opacity:0; clip-path: inset(0 100% 0 0); }
      78%     { opacity:1; clip-path: inset(0 100% 0 0); }
      86%     { opacity:1; clip-path: inset(0 0% 0 0); }
      96%     { opacity:1; clip-path: inset(0 0% 0 0); }
      100%    { opacity:1; clip-path: inset(0 100% 0 0); }
    }
  </style>

  <text x="300" y="40" text-anchor="middle" class="l1">Data Scientist</text>
  <text x="300" y="40" text-anchor="middle" class="l2">Computer Vision Engineer</text>
  <text x="300" y="40" text-anchor="middle" class="l3">ML/DL Pipeline Builder</text>
  <text x="300" y="40" text-anchor="middle" class="l4">Python | TensorFlow | OpenCV</text>

  <text x="490" y="42" class="cursor">|</text>
</svg>
